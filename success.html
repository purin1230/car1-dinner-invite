<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>回覆完成</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: linear-gradient(180deg, #f7f7f7 0%, #ececec 100%);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.10);
      padding: 40px 28px;
      text-align: center;
    }

    .icon-wrap {
      width: 76px;
      height: 76px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #f2f8f2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check {
      font-size: 36px;
      line-height: 1;
    }

    .tag {
      display: inline-block;
      font-size: 13px;
      color: #666;
      background: #f3f3f3;
      border-radius: 999px;
      padding: 6px 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.3;
      color: #111;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.8;
      color: #555;
    }

    .divider {
      width: 72px;
      height: 3px;
      background: #111;
      border-radius: 999px;
      margin: 24px auto;
      opacity: 0.12;
    }

    .footer {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 20px;
      border-radius: 12px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }

    .btn:hover {
      opacity: 0.92;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
        border-radius: 16px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <div class="check">✅</div>
    </div>

    <div class="tag">主管餐敘出席回覆</div>

    <h1>謝謝各位主管回覆</h1>

    <p>
      我們已收到您的出席資訊。<br>
      感謝您的協助與配合，敬請依活動時間準時出席。
    </p>

    <div class="divider"></div>

    <div class="footer">車麗屋汽車百貨 敬上</div>

    <a class="btn" href="./index.html">返回邀請頁</a>
  </div>
</body>
</html>
