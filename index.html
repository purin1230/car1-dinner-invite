<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主管餐敘邀請函</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Roboto, sans-serif;
      background: linear-gradient(180deg, #f6f2eb 0%, #efe6d8 100%);
      color: #2b2118;
      padding: 18px;
    }
    .page {
      max-width: 720px;
      margin: 0 auto;
      background: #fffaf3;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 16px 45px rgba(75, 48, 24, 0.18);
      border: 1px solid rgba(150, 110, 70, 0.18);
    }
    .hero {
      background: linear-gradient(135deg, #8b5a2b 0%, #c79a63 100%);
      color: #fff;
      padding: 36px 26px 30px;
      text-align: center;
    }
    .reminder {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.28);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.25;
      font-weight: 800;
    }
    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      opacity: 0.92;
      letter-spacing: 0.3px;
    }
    .content { padding: 30px 26px 34px; }
    .greeting {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .intro {
      font-size: 16px;
      line-height: 1.9;
      color: #4b4035;
      margin-bottom: 26px;
    }
    .section-title {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #ead9c5;
      margin-bottom: 22px;
    }
    .info-row {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px dashed #ead9c5;
      line-height: 1.6;
    }
    .info-row:last-child { border-bottom: none; }
    .label {
      width: 68px;
      flex-shrink: 0;
      font-weight: 700;
      color: #7a4b24;
    }
    .value { flex: 1; color: #2b2118; }
    .map-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 16px 18px;
      border-radius: 16px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      margin: 20px 0 26px;
    }
    .signature {
      text-align: center;
      margin-top: 26px;
      padding-top: 22px;
      border-top: 1px solid #ead9c5;
      line-height: 1.8;
      color: #3a2b1e;
      font-size: 16px;
    }
    .company { font-weight: 800; font-size: 18px; }
    .host { font-weight: 700; color: #7a4b24; }
    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: #8a7a68;
      text-align: center;
    }
    @media (max-width: 480px) {
      body { padding: 10px; }
      .hero { padding: 30px 20px 26px; }
      h1 { font-size: 26px; }
      .content { padding: 26px 20px 30px; }
      .info-row { display: block; }
      .label { width: auto; margin-bottom: 2px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="reminder">溫馨提醒</div>
      <h1>🎉 主管餐敘邀請函</h1>
      <div class="subtitle">You Are Invited｜Executive Dinner</div>
    </section>

    <section class="content">
      <div class="greeting">親愛的主管們您好：</div>

      <div class="intro">
        為促進跨部門交流與團隊凝聚，特別安排本次主管餐敘，<br>
        誠摯邀請您於輕鬆溫馨的氛圍中共享美食、交流情誼，<br>
        並凝聚共識，攜手推動公司未來發展。
      </div>

      <div class="section-title">📅 餐敘資訊</div>

      <div class="info-card">
        <div class="info-row"><div class="label">日期</div><div class="value">2026/04/24（五）</div></div>
        <div class="info-row"><div class="label">時間</div><div class="value">19:00</div></div>
        <div class="info-row"><div class="label">地點</div><div class="value">莎瓦迪卡海鮮·泰</div></div>
        <div class="info-row"><div class="label">地址</div><div class="value">台北市中山區松江路8號</div></div>
      </div>

      <a class="map-btn" href="https://maps.google.com/?q=莎瓦迪卡海鮮泰+松江路8號" target="_blank">
        📍 一鍵開啟 Google Map 導航
      </a>

      <div class="signature">
        <div class="company">車麗屋汽車百貨</div>
        <div class="host">總經理 卓豐閔 敬邀</div>
      </div>

      <div class="footer-note">請依餐敘時間準時出席，謝謝。</div>
    </section>
  </main>
</body>
</html>
